<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Route Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; height: 100vh; display: flex; }
    .sidebar {
      width: 400px; min-width: 280px; flex-shrink: 0;
      display: flex; flex-direction: column;
      background: #fff; border-right: 1px solid #e0e0e0; overflow: auto;
    }
    .sidebar h1 { font-size: 1.25rem; margin: 1rem 1rem 0; color: #1a1a1a; }
    .input-row { display: flex; gap: 8px; padding: 1rem; }
    .input-row input {
      flex: 1; padding: 10px 12px; border: 1px solid #dadce0; border-radius: 8px;
      font-size: 1rem;
    }
    .input-row input:focus { outline: none; border-color: #1a73e8; }
    .input-row button {
      padding: 10px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer;
    }
    .input-row button:hover { background: #1557b0; }
    .input-row button:disabled { background: #ccc; cursor: not-allowed; }
    .waypoints { padding: 0 1rem 1rem; flex: 1; overflow: auto; }
    .waypoints ul { list-style: none; padding: 0; margin: 0; }
    .waypoints li {
      padding: 8px 0; border-bottom: 1px solid #f0f0f0;
      font-size: 0.9rem; color: #3c4043;
    }
    .summary {
      padding: 1rem; margin: 0 1rem 1rem; background: #f8f9fa; border-radius: 8px;
      font-size: 1rem;
    }
    .summary .time { font-weight: 600; color: #1a1a1a; }
    .summary .distance { color: #5f6368; margin-top: 4px; }
    .error { padding: 1rem; margin: 0 1rem 1rem; background: #fce8e6; color: #c5221f; border-radius: 8px; font-size: 0.9rem; }
    #map { flex: 1; min-width: 0; }
    .map-overlay {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: #fff; padding: 10px 16px; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2); font-size: 0.95rem; white-space: nowrap;
    }
    .map-overlay .time { font-weight: 600; }
    .map-overlay .distance { color: #5f6368; margin-left: 8px; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <h1>Directions</h1>
    <div class="input-row">
      <input type="text" id="query" placeholder="e.g. Skyline Blvd from 92 to 17" />
      <button type="button" id="submit">Get route</button>
    </div>
    <div id="error" class="error" style="display: none;"></div>
    <div class="waypoints" id="waypoints" style="display: none;">
      <ul id="waypoints-list"></ul>
    </div>
    <div id="summary" class="summary" style="display: none;">
      <div class="time" id="summary-time"></div>
      <div class="distance" id="summary-distance"></div>
    </div>
  </aside>
  <div id="map" style="position: relative;">
    <div id="map-overlay" class="map-overlay" style="display: none;">
      <span class="time" id="overlay-time"></span>
      <span class="distance" id="overlay-distance"></span>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
